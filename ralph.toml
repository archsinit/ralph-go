# ralph-go example configuration
# This file demonstrates the structure of a ralph.toml config.

# Agents: Define available LLM agents
[[agent]]
name = "claude"
cli = "claude"
system_prompt = "You are Claude, helping with software engineering tasks."
enabled = true

[[agent]]
name = "codex"
cli = "codex"
system_prompt = "You are a code reviewer, focused on quality and best practices."
enabled = true

# Plan mode configuration
[plan]
# TurnOrder: list of agent names that take turns, plus the literal "user"
turn_order = ["claude", "codex", "user"]
# PlanAgent: which agent responds to /plan command
plan_agent = "claude"

# Loop mode configuration
[loop]
# Executor: agent that runs tasks
executor = "claude"
# Reviewer: agent that reviews completed tasks
reviewer = "codex"
# MaxRetries: maximum retries on task failure
max_retries = 2
# TaskTimeout: how long each task can run (15m, 1h, 30s, etc)
task_timeout = "15m"

# ntfy.sh notification settings
[loop.ntfy]
server = "https://ntfy.sh"
# CHANGE-ME to your actual ntfy topic
topic = "CHANGE-ME"
token = ""

# Git integration settings
[loop.git]
# Optional commit prefix for auto-commits
commit_prefix = ""

# Output directories
[paths]
session_dir = ".ralph/sessions"
log_dir = ".ralph/logs"
out_dir = "."
